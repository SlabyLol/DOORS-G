<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOORS 2D - DARKFOX CO. ULTIMATE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Oswald:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #050505; color: #fff; font-family: 'Oswald', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; filter: contrast(1.2) brightness(0.8); }
        
        /* UI & Overlays */
        #hud { position: fixed; top: 0; left: 0; width: 100%; padding: 15px; display: none; justify-content: space-between; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .stat { font-size: 20px; color: #f5c842; text-shadow: 2px 2px #000; }
        #door-label { font-family: 'Creepster', cursive; font-size: 32px; }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: #000; }
        .menu-title { font-family: 'Creepster', cursive; font-size: 80px; color: #f5c842; text-shadow: 0 0 20px red; margin-bottom: 20px; }
        .btn { background: #1a1a1a; border: 2px solid #f5c842; color: #f5c842; padding: 15px 40px; font-size: 20px; cursor: pointer; margin: 10px; transition: 0.2s; }
        .btn:hover { background: #f5c842; color: #000; }

        /* Mobile Controls */
        #controls { position: fixed; bottom: 40px; width: 100%; display: none; justify-content: space-between; padding: 0 40px; z-index: 50; }
        .dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px); gap: 5px; }
        .joy { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #act-btn { width: 100px; height: 100px; background: rgba(245, 200, 66, 0.2); border: 3px solid #f5c842; border-radius: 50%; color: #f5c842; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        #flash { position: fixed; inset: 0; pointer-events: none; z-index: 200; opacity: 0; background: white; }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="menu" class="screen">
        <div class="menu-title">DOORS 2D</div>
        <button class="btn" onclick="start('pc')">START PC (WASD)</button>
        <button class="btn" onclick="start('mobile')">START MOBILE</button>
    </div>

    <div id="death" class="screen" style="display:none">
        <h1 style="color:red; font-size:60px; font-family:'Creepster'">YOU DIED</h1>
        <p id="death-cause" style="margin:20px">Rush caught you!</p>
        <button class="btn" onclick="location.reload()">TRY AGAIN</button>
    </div>

    <div id="hud">
        <div class="stat" id="door-label">DOOR 001</div>
        <div class="stat">💰 <span id="gold-val">0</span></div>
    </div>

    <div id="controls">
        <div class="dpad">
            <div style="grid-column: 2" class="joy" id="b-up">W</div>
            <div style="grid-column: 1" class="joy" id="b-left">A</div>
            <div style="grid-column: 2" class="joy" id="b-down">S</div>
            <div style="grid-column: 3" class="joy" id="b-right">D</div>
        </div>
        <div id="act-btn">INTERACT / HIDE</div>
    </div>

    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let game, keys = {}, mobile = {up:false,down:false,left:false,right:false};

    function start(mode) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        if(mode === 'mobile') document.getElementById('controls').style.display = 'flex';
        resize();
        game = new DoorsGame();
        loop();
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    // Mobile Input Fix
    const setupBtn = (id, dir) => {
        const b = document.getElementById(id);
        b.addEventListener('pointerdown', (e) => { e.preventDefault(); mobile[dir] = true; b.style.background = "#f5c842"; });
        b.addEventListener('pointerup', (e) => { e.preventDefault(); mobile[dir] = false; b.style.background = ""; });
    };
    setupBtn('b-up', 'up'); setupBtn('b-down', 'down'); setupBtn('b-left', 'left'); setupBtn('b-right', 'right');
    document.getElementById('act-btn').addEventListener('pointerdown', () => game?.interact());

    class DoorsGame {
        constructor() {
            this.door = 1;
            this.gold = 0;
            this.player = { x: canvas.width/2, y: canvas.height/2, size: 30, speed: 5, hiding: false };
            this.monster = { active: false, x: -200, speed: 18 };
            this.room = this.gen();
            this.lightLevel = 1;
        }

        gen() {
            return {
                key: { x: 100 + Math.random()*(canvas.width-200), y: 100 + Math.random()*(canvas.height-200), got: false },
                gold: { x: 100 + Math.random()*(canvas.width-200), y: 100 + Math.random()*(canvas.height-200), got: false },
                closet: { x: canvas.width/2 - 50, y: 50, w: 100, h: 40 }
            };
        }

        interact() {
            const p = this.player;
            // Closet
            if(Math.hypot(p.x - this.room.closet.x - 50, p.y - this.room.closet.y - 20) < 60) {
                p.hiding = !p.hiding;
                return;
            }
            // Key
            if(!this.room.key.got && Math.hypot(p.x - this.room.key.x, p.y - this.room.key.y) < 40) {
                this.room.key.got = true;
                return;
            }
            // Next Door
            if(this.room.key.got && p.y < 50) {
                this.next();
            }
        }

        next() {
            this.door++;
            document.getElementById('door-label').innerText = "DOOR " + String(this.door).padStart(3, '0');
            this.room = this.gen();
            this.player.y = canvas.height - 100;
            if(Math.random() > 0.6) this.triggerRush();
        }

        triggerRush() {
            this.lightLevel = 0;
            setTimeout(() => {
                this.monster.active = true;
                this.monster.x = -500;
            }, 1000);
        }

        update() {
            const p = this.player;
            if(!p.hiding) {
                if(keys['w'] || mobile.up) p.y -= p.speed;
                if(keys['s'] || mobile.down) p.y += p.speed;
                if(keys['a'] || mobile.left) p.x -= p.speed;
                if(keys['d'] || mobile.right) p.x += p.speed;
            }

            // Monster Collision
            if(this.monster.active) {
                this.monster.x += this.monster.speed;
                if(!p.hiding && Math.abs(this.monster.x - p.x) < 100) {
                    this.die("Rush caught you!");
                }
                if(this.monster.x > canvas.width + 500) {
                    this.monster.active = false;
                    this.lightLevel = 1;
                }
            }

            // Gold collect
            if(!this.room.gold.got && Math.hypot(p.x - this.room.gold.x, p.y - this.room.gold.y) < 30) {
                this.room.gold.got = true;
                this.gold += 50;
                document.getElementById('gold-val').innerText = this.gold;
            }
        }

        die(msg) {
            document.getElementById('death').style.display = 'flex';
            document.getElementById('death-cause').innerText = msg;
            game = null;
        }

        draw() {
            ctx.fillStyle = this.lightLevel === 0 ? '#050000' : '#1a1a1a';
            ctx.fillRect(0,0,canvas.width, canvas.height);

            // Door
            ctx.fillStyle = this.room.key.got ? '#4a3' : '#733';
            ctx.fillRect(canvas.width/2 - 40, 0, 80, 20);

            // Closet
            ctx.fillStyle = '#321';
            ctx.fillRect(this.room.closet.x, this.room.closet.y, this.room.closet.w, this.room.closet.h);
            ctx.fillStyle = '#fff'; ctx.fillText("CLOSET", this.room.closet.x+25, this.room.closet.y+25);

            // Key & Gold
            if(!this.room.key.got) { ctx.fillStyle = 'gold'; ctx.fillRect(this.room.key.x, this.room.key.y, 15, 15); }
            if(!this.room.gold.got) { ctx.fillStyle = 'yellow'; ctx.beginPath(); ctx.arc(this.room.gold.x, this.room.gold.y, 8, 0, 7); ctx.fill(); }

            // Player
            if(!this.player.hiding) {
                ctx.fillStyle = '#3498db'; ctx.fillRect(this.player.x - 15, this.player.y - 15, 30, 30);
            }

            // Monster Rush
            if(this.monster.active) {
                ctx.fillStyle = 'rgba(255,0,0,0.6)';
                ctx.fillRect(this.monster.x - 200, 0, 400, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = "40px Oswald";
                ctx.fillText("RUSH", this.monster.x - 50, canvas.height/2);
            }
        }
    }

    function loop() {
        if(!game) return;
        game.update();
        game.draw();
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
